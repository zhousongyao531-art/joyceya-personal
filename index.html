<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度搜索广告关键词拓展工具</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="hero-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 2.8 14.4 9l6.5 2.4-6.5 2.4L12 20.2l-2.4-6.4-6.5-2.4L9.6 9 12 2.8Z"></path>
            <path d="M19 3.5v4"></path>
            <path d="M21 5.5h-4"></path>
          </svg>
        </div>
        <div>
          <h1>百度搜索广告关键词拓展工具</h1>
          <p>支持 AI 智能拓词、全网抓取和自动去重</p>
        </div>
      </section>

      <section class="input-grid" aria-label="关键词输入">
        <label class="panel">
          <span class="panel-title">种子关键词（每行一个）</span>
          <textarea id="seedKeywords" spellcheck="false">高考
志愿
复读
专业选择</textarea>
        </label>

        <label class="panel">
          <span class="panel-title">账户已有关键词（每行一个，用于去重）</span>
          <textarea id="existingKeywords" spellcheck="false" placeholder="例如：
英语培训机构
英语培训班
在线英语学习"></textarea>
        </label>
      </section>

      <section class="panel controls-panel">
        <div class="target-row">
          <label class="target-field">
            <span class="panel-title">目标关键词数量</span>
            <input id="targetCount" type="number" value="100" min="10" max="10000" step="10">
            <small>建议范围：10-10000 个关键词</small>
          </label>
          <button id="toggleChannels" class="ghost-button" type="button">取消全选</button>
        </div>

        <div class="channel-heading">拓词渠道：</div>
        <div id="channelList" class="channel-list"></div>

        <div class="action-row">
          <button id="expandButton" class="primary-button" type="button">
            <span class="button-icon" aria-hidden="true">✦</span>
            开始拓词
          </button>
          <button id="exportButton" class="secondary-button" type="button" disabled>
            <span class="button-icon" aria-hidden="true">⇩</span>
            导出 Excel
          </button>
          <button id="deleteButton" class="secondary-button" type="button" disabled>
            删除选中
          </button>
          <button id="clearButton" class="secondary-button danger" type="button" disabled>
            清空结果
          </button>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="result-header">
          <div>
            <h2>拓词结果</h2>
            <p id="summaryText">还没有结果，输入关键词后点击开始拓词。</p>
          </div>
          <div class="filters">
            <label>
              <span>来源</span>
              <select id="sourceFilter">
                <option value="all">全部来源</option>
              </select>
            </label>
            <label>
              <span>搜索</span>
              <input id="keywordSearch" type="search" placeholder="搜索关键词">
            </label>
            <label>
              <span>排序</span>
              <select id="sortMode">
                <option value="scoreDesc">评分从高到低</option>
                <option value="scoreAsc">评分从低到高</option>
                <option value="keywordAsc">关键词 A-Z</option>
              </select>
            </label>
          </div>
        </div>

        <div id="statusMessage" class="status-message" role="status"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="check-col"><input id="selectAllRows" type="checkbox" aria-label="选择全部结果"></th>
                <th>序号</th>
                <th>关键词</th>
                <th>来源渠道</th>
                <th>分类</th>
                <th>用户意图</th>
                <th>推荐匹配方式</th>
                <th>相关性评分</th>
                <th>推荐理由</th>
              </tr>
            </thead>
            <tbody id="resultBody">
              <tr class="empty-row">
                <td colspan="9">暂无关键词结果</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
